<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jio Home Assistant</title>
<style>
@font-face { font-family: 'JioType'; src: url('/static/fonts/JioTypeW04-Light.woff') format('woff'); font-weight: 300; }
@font-face { font-family: 'JioType'; src: url('/static/fonts/JioTypeW04-Medium.woff') format('woff'); font-weight: 500; }
@font-face { font-family: 'JioType'; src: url('/static/fonts/JioTypeW04-Bold.woff') format('woff'); font-weight: 700; }

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'JioType', system-ui, sans-serif;
  background: #060610;
  color: #e0e0e8;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0.02em;
  overflow: hidden;
}

/* Phone frame */
.phone {
  width: 320px;
  height: 640px;
  background: #000;
  border-radius: 44px;
  padding: 8px;
  box-shadow: 0 20px 80px rgba(15,60,201,0.15), 0 0 0 1px rgba(255,255,255,0.06);
  position: relative;
}
.phone-screen {
  width: 100%;
  height: 100%;
  border-radius: 36px;
  overflow: hidden;
  position: relative;
}

/* Status bar */
.status-bar {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  position: relative;
  z-index: 10;
}
.status-bar .time { font-size: 13px; font-weight: 700; color: #fff; }
.status-bar .indicators { font-size: 10px; color: rgba(255,255,255,0.7); display: flex; gap: 6px; align-items: center; }
.dynamic-island {
  width: 80px; height: 22px;
  background: #000; border-radius: 20px;
  position: absolute; left: 50%; transform: translateX(-50%); top: 10px;
}

/* Home screen */
.home-screen {
  height: 100%;
  background: linear-gradient(180deg, #0F3CC9 0%, #0a2885 50%, #061654 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 44px;
}
.home-logo { width: 48px; height: 48px; margin-top: 60px; }
.home-logo img { width: 100%; filter: brightness(10); }
.home-title { font-size: 22px; font-weight: 700; color: #fff; margin-top: 16px; }
.home-subtitle { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 6px; font-weight: 300; }
.home-cta {
  margin-top: 80px;
  width: 88px; height: 88px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.15), transparent 60%),
              radial-gradient(circle, #3D5FE3, #0F3CC9 60%, #0a2885);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 0 40px rgba(61,95,227,0.4), 0 0 80px rgba(15,60,201,0.2);
  transition: transform 0.2s, box-shadow 0.3s;
}
.home-cta:hover {
  transform: scale(1.05);
  box-shadow: 0 0 60px rgba(61,95,227,0.6), 0 0 120px rgba(15,60,201,0.3);
}
.home-cta svg { width: 32px; height: 32px; fill: #fff; }
.home-cta-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 16px; font-weight: 500; }

/* Customer selector */
.customer-select {
  margin-top: auto;
  margin-bottom: 40px;
  display: flex; gap: 6px;
}
.customer-select button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  font-family: 'JioType', sans-serif;
  font-size: 9px; font-weight: 500;
  padding: 5px 10px;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.2s;
}
.customer-select button.active,
.customer-select button:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border-color: rgba(255,255,255,0.25);
}

/* Voice screen */
.voice-screen {
  height: 100%;
  background: linear-gradient(180deg, #061654 0%, #0a1a3a 40%, #0d0d1a 100%);
  display: flex;
  flex-direction: column;
  padding-top: 44px;
}
.voice-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
}
.voice-header-left { display: flex; align-items: center; gap: 8px; }
.voice-header-dot { width: 8px; height: 8px; border-radius: 50%; background: #0F3CC9; }
.voice-header-title { font-size: 13px; font-weight: 700; color: #fff; }
.voice-header-sub { font-size: 9px; color: rgba(255,255,255,0.4); font-weight: 300; }
.voice-close {
  background: rgba(255,255,255,0.08);
  border: none; color: rgba(255,255,255,0.5);
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}

/* Orb */
.orb-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 0 12px;
  flex-shrink: 0;
}
.orb {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.12), transparent 60%),
              radial-gradient(circle, #3D5FE3, #0F3CC9 60%, #0a2885);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  position: relative;
  transition: transform 0.2s;
}
.orb:hover { transform: scale(1.04); }
.orb.listening {
  box-shadow: 0 0 30px rgba(61,95,227,0.5), 0 0 60px rgba(15,60,201,0.25);
  animation: orbPulse 2s ease-in-out infinite;
}
.orb.thinking {
  box-shadow: 0 0 20px rgba(234,179,8,0.3), 0 0 50px rgba(234,179,8,0.1);
  animation: orbSpin 1.5s linear infinite;
}
.orb.speaking {
  box-shadow: 0 0 40px rgba(61,95,227,0.6), 0 0 80px rgba(15,60,201,0.3);
  animation: orbPulse 1s ease-in-out infinite;
}
.orb-ring {
  position: absolute;
  width: 100%; height: 100%;
  border-radius: 50%;
  border: 1px solid rgba(61,95,227,0.2);
  animation: ringExpand 3s ease-out infinite;
}
.orb-ring:nth-child(2) { animation-delay: 1s; }
.orb-ring:nth-child(3) { animation-delay: 2s; }
.orb-text { font-size: 14px; font-weight: 700; color: #fff; position: relative; z-index: 1; }

/* Waveform */
.waveform {
  display: flex; gap: 3px; align-items: center; justify-content: center;
  height: 24px; margin-top: 12px;
}
.waveform .bar {
  width: 3px; border-radius: 2px;
  background: rgba(61,95,227,0.6);
  transition: height 0.15s;
}
.waveform.active .bar { animation: waveform 0.4s ease-in-out infinite alternate; }
.waveform.active .bar:nth-child(1) { animation-delay: 0s; }
.waveform.active .bar:nth-child(2) { animation-delay: 0.05s; }
.waveform.active .bar:nth-child(3) { animation-delay: 0.1s; }
.waveform.active .bar:nth-child(4) { animation-delay: 0.15s; }
.waveform.active .bar:nth-child(5) { animation-delay: 0.1s; }
.waveform.active .bar:nth-child(6) { animation-delay: 0.05s; }
.waveform.active .bar:nth-child(7) { animation-delay: 0s; }

.voice-status {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  text-align: center;
  margin-top: 8px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  min-height: 16px;
}

/* Conversation stream */
.conversation {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 100%);
}
.conversation::-webkit-scrollbar { width: 2px; }
.conversation::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 1px; }

.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 12px;
  line-height: 1.6;
  animation: msgIn 0.3s ease-out;
}
.msg.user {
  align-self: flex-end;
  background: rgba(61,95,227,0.2);
  border: 1px solid rgba(61,95,227,0.15);
  color: rgba(255,255,255,0.9);
  border-bottom-right-radius: 4px;
}
.msg.agent {
  align-self: flex-start;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.85);
  border-bottom-left-radius: 4px;
}
.msg .meta {
  font-size: 9px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 4px;
  font-weight: 500;
}
.msg .tools {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin-top: 6px;
}
.msg .tools span {
  font-size: 8px;
  background: rgba(61,95,227,0.15);
  color: rgba(61,95,227,0.8);
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
}
.msg .thinking-dots {
  display: flex; gap: 4px; padding: 4px 0;
}
.msg .thinking-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  animation: dotPulse 1.2s ease-in-out infinite;
}
.msg .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.msg .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

/* Animations */
@keyframes orbPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
@keyframes orbSpin {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(30deg); }
}
@keyframes ringExpand {
  0% { transform: scale(1); opacity: 0.4; }
  100% { transform: scale(2.2); opacity: 0; }
}
@keyframes waveform {
  0% { height: 4px; }
  100% { height: 20px; }
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes dotPulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Hidden state */
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="phone">
<div class="phone-screen">

  <!-- Status bar (always visible) -->
  <div class="status-bar">
    <span class="time" id="clock">12:06</span>
    <div class="dynamic-island"></div>
    <div class="indicators">
      <span>5G</span>
      <span>||</span>
    </div>
  </div>

  <!-- HOME SCREEN -->
  <div class="home-screen" id="homeScreen">
    <div class="home-logo"><img src="/static/jio-logo-white.svg" alt="Jio"></div>
    <div class="home-title">Jio Home</div>
    <div class="home-subtitle">Your AI broadband assistant</div>

    <div class="home-cta" id="startBtn" onclick="startVoice()">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </div>
    <div class="home-cta-label">Tap to talk</div>

    <div class="customer-select">
      <button class="active" onclick="selectCustomer('JIO-001', this)">Raj (Hindi)</button>
      <button onclick="selectCustomer('JIO-002', this)">Priya (English)</button>
      <button onclick="selectCustomer('JIO-003', this)">Amit (Hinglish)</button>
    </div>
  </div>

  <!-- VOICE SCREEN -->
  <div class="voice-screen hidden" id="voiceScreen">
    <div class="voice-header">
      <div class="voice-header-left">
        <div class="voice-header-dot"></div>
        <div>
          <div class="voice-header-title">Jio Home</div>
          <div class="voice-header-sub">AI Assistant</div>
        </div>
      </div>
      <button class="voice-close" onclick="endVoice()">x</button>
    </div>

    <div class="orb-container">
      <div class="orb" id="orb" onclick="toggleListening()">
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <span class="orb-text">jio</span>
      </div>
      <div class="waveform" id="waveform">
        <div class="bar" style="height:6px"></div>
        <div class="bar" style="height:10px"></div>
        <div class="bar" style="height:14px"></div>
        <div class="bar" style="height:18px"></div>
        <div class="bar" style="height:14px"></div>
        <div class="bar" style="height:10px"></div>
        <div class="bar" style="height:6px"></div>
      </div>
      <div class="voice-status" id="voiceStatus">Tap the orb to speak</div>
    </div>

    <div class="conversation" id="conversation"></div>
  </div>

</div>
</div>

<script>
// State
let customerId = 'JIO-001';
let isListening = false;
let recognition = null;

// Clock
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false });
}
updateClock();
setInterval(updateClock, 30000);

// Customer selector
function selectCustomer(id, btn) {
  customerId = id;
  document.querySelectorAll('.customer-select button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Screen transitions
function startVoice() {
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('voiceScreen').classList.remove('hidden');
}

function endVoice() {
  document.getElementById('voiceScreen').classList.add('hidden');
  document.getElementById('homeScreen').classList.remove('hidden');
  if (recognition) recognition.stop();
  isListening = false;
  updateOrbState('idle');
}

// Orb states
function updateOrbState(state) {
  const orb = document.getElementById('orb');
  const wf = document.getElementById('waveform');
  const status = document.getElementById('voiceStatus');
  orb.className = 'orb ' + state;
  wf.className = state === 'listening' || state === 'speaking' ? 'waveform active' : 'waveform';
  const labels = {
    idle: 'Tap the orb to speak',
    listening: 'Listening...',
    thinking: 'Thinking...',
    speaking: 'Responding...',
  };
  status.textContent = labels[state] || '';
}

// Speech recognition
function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.continuous = false;
  r.interimResults = true;
  r.lang = 'hi-IN'; // Hindi primary, handles Hinglish + English too
  r.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    if (e.results[0].isFinal) {
      addMessage(transcript, 'user');
      isListening = false;
      updateOrbState('thinking');
      sendToAgent(transcript);
    }
  };
  r.onerror = () => { isListening = false; updateOrbState('idle'); };
  r.onend = () => { if (isListening) { r.start(); } };
  return r;
}

function toggleListening() {
  if (isListening) {
    recognition.stop();
    isListening = false;
    updateOrbState('idle');
  } else {
    if (!recognition) recognition = initSpeechRecognition();
    if (!recognition) {
      addMessage('Speech recognition not available in this browser. Use Chrome.', 'agent');
      return;
    }
    recognition.start();
    isListening = true;
    updateOrbState('listening');
  }
}

// Messages
function addMessage(text, type, agent, tools) {
  const conv = document.getElementById('conversation');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  let html = '';
  if (agent) html += '<div class="meta">' + agent + '</div>';
  html += text;
  if (tools && tools.length) {
    html += '<div class="tools">' +
      tools.filter(t => t !== 'transfer_to_agent').map(t => '<span>' + t + '</span>').join('') +
      '</div>';
  }
  div.innerHTML = html;
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
  return div;
}

function addThinking() {
  const conv = document.getElementById('conversation');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'thinking-msg';
  div.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
  return div;
}

function removeThinking() {
  const el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

// Send to Agent Engine
async function sendToAgent(text) {
  addThinking();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, customer_id: customerId }),
    });
    const data = await res.json();
    removeThinking();
    updateOrbState('speaking');
    addMessage(data.response, 'agent', data.agent, data.tools);

    // TTS - speak the response
    if ('speechSynthesis' in window && data.response) {
      const utter = new SpeechSynthesisUtterance(data.response);
      utter.lang = customerId === 'JIO-002' ? 'en-IN' : 'hi-IN';
      utter.rate = 1.0;
      utter.onend = () => updateOrbState('idle');
      speechSynthesis.speak(utter);
    } else {
      setTimeout(() => updateOrbState('idle'), 1500);
    }
  } catch (err) {
    removeThinking();
    addMessage('Connection error. Please try again.', 'agent', 'system');
    updateOrbState('idle');
  }
}
</script>
</body>
</html>
